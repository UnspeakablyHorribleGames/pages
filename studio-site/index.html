<script type="text/babel" data-presets="react">
  function App() {
    const [view, setView] = React.useState("home");
    const [theme, setTheme] = React.useState("dark");
    React.useEffect(() => {
      document.documentElement.setAttribute("data-theme", theme);
      window.scrollTo(0, 0);
    }, [theme]);
    React.useEffect(() => { window.scrollTo({ top: 0 }); }, [view]);
    const toggleTheme = () => setTheme((t) => (t === "dark" ? "light" : "dark"));
    const { Header, Footer, HomeScreen, GamesScreen, AboutScreen, TeamScreen } = window;
    return (
      <React.Fragment>
        <Header view={view} setView={setView} theme={theme} toggleTheme={toggleTheme} />
        <main id="app-main">
          {view === "home" && <HomeScreen setView={setView} />}
          {view === "games" && <GamesScreen />}
          {view === "about" && <AboutScreen />}
          {view === "team" && <TeamScreen />}
        </main>
        <Footer setView={setView} />
      </React.Fragment>
    );
  }
  // Wait for all babel-transpiled component scripts to register on window.
  function boot() {
    if (!window.HomeScreen || !window.Header || !window.UnspeakablyHorribleGamesDesignSystem_e246c6) {
      return setTimeout(boot, 30);
    }
    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  }
  boot();
